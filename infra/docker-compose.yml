version: '3.8'
services:
  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "4000:4000"
  frontend:
    build: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
