{% extends 'base.html' %}
{% block title %}تقييم المهارات{% endblock %}
{% block content %}
<div style="max-width:800px;margin:40px auto;padding:0 24px">
  <h1 style="font-size:1.6rem;font-weight:900;margin-bottom:8px">🔍 تقييم المهارات</h1>
  <p style="color:var(--text-muted);margin-bottom:28px">اختر مادة واستكشف مستواك في كل فصل بالتفصيل</p>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px">
    {% for subj, info in subjects.items() %}
    <div class="card" style="border-color:{{ info.color }}30">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:2.5rem;margin-bottom:8px">{{ info.icon }}</div>
        <div style="font-weight:800;font-size:1.1rem">{{ info.ar }}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <a href="{{ url_for('student.exam', subject=subj, exam_type='chapter_1') }}"
           class="btn btn-secondary btn-sm btn-full">📖 الفصل الأول</a>
        <a href="{{ url_for('student.exam', subject=subj, exam_type='chapter_2') }}"
           class="btn btn-secondary btn-sm btn-full">📖 الفصل الثاني</a>
        <a href="{{ url_for('student.exam', subject=subj, exam_type='final_test') }}"
           class="btn btn-primary btn-sm btn-full">🎯 اختبار شامل</a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
